<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube UI Clone</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- Header -->
<header class="header">
  <div class="logo">YouTube</div>

  <input type="text" placeholder="Search">

  <div class="profile">👤</div>
</header>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <ul>
      <li>Home</li>
      <li>Trending</li>
      <li>Subscriptions</li>
      <li>Library</li>
    </ul>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <div class="video-grid">

      <div class="video-card">
        <img src="https://picsum.photos/id/180/300/170">
        <h4>Frontend Project for Beginners</h4>
        <p>code with prasanna• 1M views</p>
      </div>

      <div class="video-card">
        <img src="https://picsum.photos/id/1/300/170">
        <h4>Learn HTML in 10 minutes</h4>
        <p>Tech World• 500K views</p>
      </div>

      <div class="video-card">
        <img src="https://picsum.photos/id/20/300/170">
        <h4>CSS Flexbox Full Tutorial</h4>
        <p>Code Master• 200K views</p>
      </div>

      <div class="video-card">
        <img src="https://picsum.photos/id/30/300/170">
        <h4>JavaScript Basics for Beginners</h4>
        <p>Dev Studio• 900K views</p>
      </div>

    </div>

  </main>

</div>

</body>
</html>
